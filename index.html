<!DOCTYPE html>
<html lang="en">
<head>

    <nav class="nav">
      <button class="nav-item" data-section="home">

      <button class="nav-item" data-section="profile">

      <button class="nav-item" data-section="experience">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="6.5" width="14" height="9.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 6.5V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Professional Experience</span>

      <button class="nav-item" data-section="projects">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Projects</span>
      </button>
      <button class="nav-item" data-section="skills">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 2.5l2.2 4.6 5 .7-3.6 3.5.85 5-4.45-2.3-4.45 2.3.85-5L2.8 7.8l5-.7L10 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span>Skills</span>
      </button>
      <button class="nav-item" data-section="education">
        <svg viewBox="0 0 20 20" fill="none"><path d="M2 7l8-3.5L18 7l-8 3.5L2 7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M5.5 9v3.5c0 1 2 2 4.5 2s4.5-1 4.5-2V9" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Education</span>
      </button>
    </nav>

    <div class="sidebar-bottom">
      <a class="footer-link" id="link-email" href="mailto:anveshariya001@gmail.com">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2.5" y="4.5" width="15" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 5.5l7 5.5 7-5.5" stroke="currentColor" stroke-width="1.4"/></svg>

        <span>LinkedIn</span>
      </a>
      <a class="footer-link" id="link-github" href="https://github.com/anvesha-riya" target="_blank" rel="noopener">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 2.5c-4.1 0-7.5 3.4-7.5 7.5 0 3.3 2.1 6 5.1 7 .4.1.5-.2.5-.4v-1.4c-2.1.4-2.5-1-2.5-1-.3-.9-.8-1.1-.8-1.1-.7-.5.1-.5.1-.5.7.1 1.1.7 1.1.7.7 1.1 1.7.8 2.1.6.1-.5.3-.8.5-1-1.7-.2-3.5-.9-3.5-3.8 0-.9.3-1.5.7-2.1-.1-.2-.3-1 .1-2.1 0 0 .6-.2 2 .8.6-.2 1.2-.2 1.8-.2s1.2.1 1.8.2c1.4-1 2-.8 2-.8.4 1.1.2 1.9.1 2.1.5.6.7 1.3.7 2.1 0 2.9-1.8 3.6-3.5 3.8.3.2.5.7.5 1.4v2.1c0 .2.1.5.6.4 3-1 5.1-3.7 5.1-7 0-4.1-3.4-7.5-7.5-7.5z" fill="currentColor"/></svg>

    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="topbar">
      <span class="topbar-pill">Product Manager · Delhi NCR, India</span>
    </div>

    <!-- HOME / CHAT LANDING -->
    <section id="view-home" class="view view-home active">
      <div class="home-inner">
        <div class="greeting">
          <svg class="greeting-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"/>
          </svg>
          <h1><span id="time-greeting">Hello</span>, I'm Anvesha</h1>
        </div>

        <form id="chat-form" class="chat-box">
          <input id="chat-input" type="text" placeholder="Ask about my experience, projects, or skills…" autocomplete="off">
          <button type="submit" aria-label="Send">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 16V4M10 4l-5 5M10 4l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>

        <div class="quick-pills">
          <button class="pill" data-prompt="Tell me about your current role">Current role</button>
          <button class="pill" data-prompt="What projects have you built?">Projects</button>
          <button class="pill" data-prompt="What are your skills?">Skills</button>
          <button class="pill" data-prompt="Where did you study?">Education</button>
          <button class="pill" data-prompt="How can I contact you?">Contact</button>
        </div>
      </div>
    </section>

    <!-- CHAT TRANSCRIPT VIEW -->
    <section id="view-chat" class="view view-chat">
      <div id="chat-thread" class="chat-thread"></div>
      <form id="chat-form-2" class="chat-box chat-box-docked">
        <input id="chat-input-2" type="text" placeholder="Ask a follow-up…" autocomplete="off">
        <button type="submit" aria-label="Send">
          <svg viewBox="0 0 20 20" fill="none"><path d="M10 16V4M10 4l-5 5M10 4l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </section>

  </main>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
